# =============================================================================
# Squid Configuration - Optimisée pour les conteneurs IA
# - Écoute sur localhost uniquement
# - Filtrage des URLs via ACL
# - Tourne en tant qu'utilisateur 'nobody' (pas root)
# - Logging minimal (sans URLs complètes pour éviter les fuites)
# =============================================================================

# Port d'écoute (localhost uniquement pour la sécurité)
http_port 127.0.0.1:3128

# Désactiver la cache
cache deny all

# Journalisation (format minimal pour éviter les fuites de données)
access_log /var/log/squid/access.log
logformat=%{Date} %{Method} %{Host} %{Status}

# Désactiver les logs détaillés
cache_log none
dns_testnames none

# =============================================================================
# RÈGLES DE FILTRAGE (ACL)
# =============================================================================

# ACL pour localhost
acl localhost src 127.0.0.1/32

# ACL pour les méthodes HTTP autorisées
acl allowed_methods method GET POST HEAD OPTIONS

# ACL pour les ports sûrs
acl safe_ports port 80      # HTTP
acl safe_ports port 443     # HTTPS
acl safe_ports port 22      # SSH (si nécessaire)
acl ssl_ports port 443

# ACL pour les URLs autorisées (chargées depuis un fichier)
acl allowed_urls dstdomain "/etc/squid/allowed-urls.txt"

# =============================================================================
# RÈGLES D'ACCÈS
# =============================================================================

# Bloquer tout par défaut
http_access deny !safe_ports
http_access deny !allowed_methods

# Autoriser localhost
http_access allow localhost

# Autoriser les URLs de la liste
http_access allow allowed_urls

# Bloquer tout le reste
http_access deny all

# =============================================================================
# SÉCURITÉ SUPPLÉMENTAIRE
# =============================================================================

# Désactiver les requêtes TRACE
request_header_access Allow allow all
request_header_access Authorization allow all
request_header_access Proxy-Authorization allow all

# Bloquer les requêtes CONNECT (sauf pour HTTPS)
http_access deny CONNECT !ssl_ports

# =============================================================================
# PERFORMANCES
# =============================================================================

# Timeout pour les requêtes
request_timeout 300
persistent_request_timeout 600

# Limite de connexions
max_connection_age 600
max_connection_duration 600
