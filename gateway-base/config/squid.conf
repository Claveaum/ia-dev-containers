# =============================================================================
# Gateway squid.conf - générique
#
# Le fichier clients/*/gateway/config/allowed-urls.txt est copié par-dessus
# au build de l'image client, à /etc/squid/allowed-urls.txt.
#
# Notes de conception :
# - Pas de cache_dir : rien à écrire sur disque -> compatible --read-only.
# - Logs vers stdout (podman logs), pas de fichier -> pas de pidfile/logfile
#   à rendre inscriptible pour l'utilisateur non-root.
# - Log au format Host uniquement (pas l'URL complète) pour éviter de logger
#   des chemins/paramètres potentiellement sensibles.
# =============================================================================

http_port 0.0.0.0:3128
visible_hostname gateway

# Résolveurs DNS explicites : le gateway est attaché à deux réseaux (interne
# + uplink), et aardvark-dns (réseau interne) écrase /etc/resolv.conf avec un
# résolveur qui ne connaît que les noms de conteneurs locaux (NXDOMAIN pour
# tout le reste). Squid doit donc résoudre les domaines externes lui-même,
# sans dépendre de resolv.conf.
dns_nameservers 1.1.1.1 9.9.9.9

# ---- Logging minimal, sans écriture disque ----
logformat minimal %tl %rm %{Host}>h %>Hs
access_log stdio:/dev/stdout minimal
cache_log none
pid_filename none

# ---- Pas de cache ----
cache deny all

# ---- ACL ----
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# Doit correspondre au --subnet utilisé par `podman network create --internal`
# (voir clients/*/scripts/lib.sh : SUBNET).
acl workspace_net src 10.89.0.0/24

acl allowed_urls dstdomain "/etc/squid/allowed-urls.txt"

# ---- Règles d'accès : deny-by-default, allowlist uniquement ----
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny !workspace_net
http_access allow workspace_net allowed_urls
http_access deny all

# ---- Exécution non-root explicite (pas supposée) ----
cache_effective_user nobody nobody

request_timeout 300 seconds
